<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysian Survey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="survey-container">
        <h1>Elysian Feedback Survey</h1>
        <p class="subtitle">We value your thoughts. Please complete the survey below.</p>

        <form id="surveyForm">

            <label for="name">1. Full Name</label>
            <input type="text" id="name" required>

            <label for="email">2. Email Address</label>
            <input type="email" id="email" required>

            <label for="subject">3. Favorite Subject</label>
            <select id="subject" required>
                <option value="">Select one</option>
                <option value="Math">Math</option>
                <option value="Science">Science</option>
                <option value="Programming">Programming</option>
                <option value="Web Design">Web Design</option>
                <option value="Networking">Networking</option>
            </select>

            <label>4. How would you rate this class?</label>
            <div class="radio-group">
                <label><input type="radio" name="rating" value="1" required> 1</label>
                <label><input type="radio" name="rating" value="2"> 2</label>
                <label><input type="radio" name="rating" value="3"> 3</label>
                <label><input type="radio" name="rating" value="4"> 4</label>
                <label><input type="radio" name="rating" value="5"> 5</label>
            </div>

            <label for="difficulty">5. How difficult is the course?</label>
            <select id="difficulty">
                <option value="">Select one</option>
                <option value="Easy">Easy</option>
                <option value="Moderate">Moderate</option>
                <option value="Hard">Hard</option>
            </select>

            <label>6. Which features would you like to improve?</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="features" value="Assignments"> Assignments</label>
                <label><input type="checkbox" name="features" value="Lectures"> Lectures</label>
                <label><input type="checkbox" name="features" value="Projects"> Projects</label>
                <label><input type="checkbox" name="features" value="Group Work"> Group Work</label>
            </div>

            <label for="study">7. How often do you study?</label>
            <select id="study">
                <option value="">Select one</option>
                <option value="Daily">Daily</option>
                <option value="Weekly">Weekly</option>
                <option value="Rarely">Rarely</option>
            </select>

            <label for="recommend">8. Would you recommend this class?</label>
            <select id="recommend" required>
                <option value="">Select one</option>
                <option value="Yes">Yes</option>
                <option value="Maybe">Maybe</option>
                <option value="No">No</option>
            </select>

            <label>9. Do you feel confident in the material?</label>
            <div class="radio-group">
                <label><input type="radio" name="confidence" value="Yes"> Yes</label>
                <label><input type="radio" name="confidence" value="Somewhat"> Somewhat</label>
                <label><input type="radio" name="confidence" value="No"> No</label>
            </div>

            <label for="comments">10. Additional Comments</label>
            <textarea id="comments" rows="5" placeholder="Write your thoughts here..."></textarea>

            <button type="submit">Submit Survey</button>
        </form>

        <div id="resultBox" class="result-box">
            <h2>Survey Submitted</h2>
            <p id="resultMessage"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
