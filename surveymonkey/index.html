<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysian Survey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="survey-container">
    <h1>Elysian Feedback Survey</h1>
    <p class="subtitle">We value your thoughts. Please complete the survey below.</p>

    <form id="surveyForm">

        <!-- Q1 -->
        <label>1. Full Name</label>
        <input type="text" id="name" required>

        <!-- Q2 -->
        <label>2. Email Address</label>
        <input type="email" id="email" required>

        <!-- Q3 -->
        <label>3. Favorite Subject</label>
        <select id="subject" required>
            <option value="">Select one</option>
            <option>Math</option>
            <option>Science</option>
            <option>Programming</option>
            <option>Web Design</option>
            <option>Networking</option>
        </select>

        <!-- Q4 -->
        <label>4. How would you rate this class?</label>
        <div class="radio-group">
            <label><input type="radio" name="rating" value="1" required> 1</label>
            <label><input type="radio" name="rating" value="2"> 2</label>
            <label><input type="radio" name="rating" value="3"> 3</label>
            <label><input type="radio" name="rating" value="4"> 4</label>
            <label><input type="radio" name="rating" value="5"> 5</label>
        </div>

        <!-- Q5 -->
        <label>5. How difficult is the course?</label>
        <select id="difficulty">
            <option value="">Select one</option>
            <option>Easy</option>
            <option>Moderate</option>
            <option>Hard</option>
        </select>

        <!-- Q6 -->
        <label>6. Which features would you like to improve?</label>
        <div class="checkbox-group">
            <label><input type="checkbox" name="features" value="Assignments"> Assignments</label>
            <label><input type="checkbox" name="features" value="Lectures"> Lectures</label>
            <label><input type="checkbox" name="features" value="Projects"> Projects</label>
            <label><input type="checkbox" name="features" value="Group Work"> Group Work</label>
        </div>

        <!-- Q7 -->
        <label>7. How often do you study?</label>
        <select id="study">
            <option value="">Select one</option>
            <option>Daily</option>
            <option>Weekly</option>
            <option>Rarely</option>
        </select>

        <!-- Q8 -->
        <label>8. Would you recommend this class?</label>
        <select id="recommend" required>
            <option value="">Select one</option>
            <option>Yes</option>
            <option>Maybe</option>
            <option>No</option>
        </select>

        <!-- Q9 -->
        <label>9. Do you feel confident in the material?</label>
        <div class="radio-group">
            <label><input type="radio" name="confidence" value="Yes"> Yes</label>
            <label><input type="radio" name="confidence" value="Somewhat"> Somewhat</label>
            <label><input type="radio" name="confidence" value="No"> No</label>
        </div>

        <!-- Q10 -->
        <label>10. Additional Comments</label>
        <textarea id="comments" rows="5" placeholder="Write your thoughts here..."></textarea>

        <button type="submit">Submit Survey</button>
    </form>

    <div id="resultBox" class="result-box">
        <h2>Survey Submitted</h2>
        <p id="resultMessage"></p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
